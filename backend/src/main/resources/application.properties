spring.application.name=library-management-system

# H2 file database
spring.datasource.url=jdbc:h2:file:./data/librarydb_final;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Prevent empty data.sql execution issues
spring.sql.init.mode=never

# Server
server.port=${PORT:10000}

# CORS - allow React dev server
spring.web.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*

# JWT Secret (change this in production!)
app.jwt.secret=${APP_JWT_SECRET:LibraryManagementSystemSuperSecretKeyForJWTTokenGeneration2024!}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Logging
logging.level.com.library=INFO
